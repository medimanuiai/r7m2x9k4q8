/* Jyothishyam – reusable yoga silhouette
   Use as <img>, <object>, or inline.
   aria-hidden="true" when decorative. */
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250"
     role="img" aria-label="Person meditating in lotus pose">
  <title>Meditation silhouette</title>
  <g fill="white">
    <!-- Head -->
    <ellipse cx="100" cy="31" rx="19" ry="21"/>
    <!-- Neck + upper torso join -->
    <path d="M90 50 Q100 57 110 50 L108 63 Q100 67 92 63Z"/>
    <!-- Torso -->
    <path d="M92 63 Q73 69 66 87 Q84 95 100 93 Q116 95 134 87 Q127 69 108 63Z"/>
    <!-- Lower torso / hip -->
    <path d="M66 87 Q60 108 58 124 L100 130 L142 124 Q140 108 134 87Z"/>
    <!-- Left arm resting outward on knee -->
    <path d="M70 75 Q55 85 45 98 Q38 111 41 123 Q50 126 56 119
             Q56 108 63 98 Q72 88 78 80Z"/>
    <!-- Right arm -->
    <path d="M130 75 Q145 85 155 98 Q162 111 159 123 Q150 126 144 119
             Q144 108 137 98 Q128 88 122 80Z"/>
    <!-- Left leg in lotus -->
    <path d="M58 124 Q46 142 44 162 Q46 177 60 182
             Q77 187 92 179 Q88 163 84 148 Q75 136 58 124Z"/>
    <!-- Right leg in lotus -->
    <path d="M142 124 Q154 142 156 162 Q154 177 140 182
             Q123 187 108 179 Q112 163 116 148 Q125 136 142 124Z"/>
    <!-- Left hand (mudra) -->
    <ellipse cx="44" cy="125" rx="11" ry="7" transform="rotate(-8 44 125)"/>
    <!-- Right hand (mudra) -->
    <ellipse cx="156" cy="125" rx="11" ry="7" transform="rotate(8 156 125)"/>
    <!-- Aura ring – decorative -->
    <circle cx="100" cy="31" r="30" fill="none" stroke="white" stroke-width="0.8" opacity="0.35"/>
    <circle cx="100" cy="125" r="85" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  </g>
</svg>

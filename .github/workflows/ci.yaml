name: Prompt-01 Stage-01

on:
  push:
    branches: [ main, pilot, '**/pilot-updates-*' ]
  pull_request:
    branches: [ main, pilot ]

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: systems/Parasara/Documentation/Engine/Prompt-01/WorkPackage/Reports/WP00/requirements-stage01.lock.txt
      - name: Print resolved Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install locked Stage-01 dependencies
        run: |
          python -m pip install --disable-pip-version-check -r systems/Parasara/Documentation/Engine/Prompt-01/WorkPackage/Reports/WP00/requirements-stage01.lock.txt
          python -m pip install --disable-pip-version-check --no-deps -e systems/SuryaSiddhanta
      - name: Run authoritative Prompt-01 validation
        run: python tools/validate_prompt01.py full

  required:
    name: Prompt-01 required gate
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Require both Python lanes
        env:
          VALIDATION_RESULT: ${{ needs.validate.result }}
        run: test "$VALIDATION_RESULT" = "success"

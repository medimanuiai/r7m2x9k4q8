name: Parasara Snapshot Compare

on:
  pull_request:
    paths:
      - 'systems/Parasara/**'
  push:
    branches:
      - main

jobs:
  snapshot-compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f systems/Parasara/requirements.txt ]; then python -m pip install -r systems/Parasara/requirements.txt; fi

      - name: Run snapshot compare
        run: |
          PYTHONPATH=. python systems/Parasara/tools/ci_snapshot_check.py \
            --fixture systems/Parasara/fixtures/golden_chart_01.json \
            --approved systems/Parasara/tests/snapshots/output_golden_chart_01.json

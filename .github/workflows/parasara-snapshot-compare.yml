name: Parasara Snapshot Compare

on:
  pull_request:
    paths:
      - 'systems/Parasara/**'
  push:
    branches:
      - main

jobs:
  snapshot-compare:
    permissions:
      contents: read
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r systems/Parasara/Documentation/Engine/Prompt-01/WorkPackage/Reports/WP00/requirements-stage01.lock.txt
          python -m pip install --disable-pip-version-check --no-deps -e systems/SuryaSiddhanta

      - name: Run supplemental no-update snapshot compare
        run: |
          $env:PYTHONPATH = '.'
          $snapshotOutput = Join-Path $env:RUNNER_TEMP 'parasara-snapshot.json'
          python systems/Parasara/tools/ci_snapshot_check.py --fixture systems/Parasara/fixtures/golden_chart_01.json --approved systems/Parasara/tests/snapshots/output_golden_chart_01.json --out $snapshotOutput
